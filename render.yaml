databases:
  - name: frontieres-db
    plan: free
    databaseName: frontieres_db
    postgresMajorVersion: "16"

services:
  - type: web
    name: frontieres-api
    runtime: node
    plan: free
    buildCommand: npm install && npm run init-db
    startCommand: node src/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: frontieres-db
          property: connectionString
